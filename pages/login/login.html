<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <title>Đăng nhập</title>
</head>
<body>
    <div class="login_page">
        <img src="/assets/images/logo.png" alt="">
        <div class="login_page_form">
            <div class="form_title">
                <h1 class="text_title_page">Đăng nhập</h1>
            </div>
            <div class="form_infor">
                <div class="form_infor_item form_infor_email">
                    <h4 class="text_title">Tài khoản</h4>
                    <input type="email" placeholder="Nhập vào email của bạn">
                </div>
                <div class="form_infor_item form_infor_pass">
                    <h4 class="text_title">Mật khẩu</h4>
                    <input type="password" placeholder="Nhập vào mật khẩu của bạn">
                </div>
                <div class="form_infor_item form_infor_button">
                    <button class="text_title">Đăng nhập</button>
                </div>
            </div>
            <div class="form_other">
                <div class="form_other_forgot">
                    <a href="" class="text_navigation">Quên mật khẩu</a>
                </div>
                <div class="form_other_register">
                    <p class="text_navigation">Bạn chưa có tài khoản? <a href="">Đăng ký</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
